# No-Fedora/Wings stack: add DISABLE_WINGS and skip flags to web and worker.
# Override service names are "web" and "worker" (they inherit from x-app in the base).
x-no-wings-env: &no-wings-env
  DISABLE_WINGS: "true"
  HYRAX_SKIP_WINGS: "true"
  HYRAX_SKIP_FREYJA: "false"
  HYRAX_SKIP_FRIGG: "true"
  VALKYRIE_TRANSITION: "false"

services:
  web:
    environment: *no-wings-env
  worker:
    environment: *no-wings-env
