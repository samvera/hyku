    name: "Non-text Content"
    level: A
    coverage: automated_axe
    evidence: "axe rules (image-alt, input-image-alt, object-alt, etc.); manual spot check for decorative images and uploaded-content edge cases"
    specs:
      - "spec/features/accessibility/critical_paths_accessibility_spec.rb"
      - "spec/features/accessibility/extended_paths_accessibility_spec.rb"
    notes: []

  - id: "1.2.1"
    name: "Audio-only and Video-only (Prerecorded)"
    level: A
    coverage: manual
    evidence: "Content-dependent; verify transcripts or alternatives where media is exposed"
    specs: []
    notes: []

  - id: "1.2.2"
    name: "Captions (Prerecorded)"
    level: A
    coverage: manual
    evidence: "Content-dependent"
    specs: []
    notes: []

