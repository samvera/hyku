# WCAG 2.1 Level A & AA traceability for Hyku
# coverage: automated_axe | semi_automated | manual
# Align VPAT rows with the current ITI VPAT workbook approved by your organization.
#
# Automated runs: bundle exec rspec --tag a11y
# axe tags: wcag2a, wcag2aa, wcag21aa (see spec/support/accessibility_helpers.rb)

meta:
  product: Hyku
  wcag_version: "2.1"
  conformance_level: "A and AA"
  vpat_template: "Current ITI VPAT workbook for WCAG 2.1 / Section 508 as required"
  ci:
    workflow: ".github/workflows/build-test-lint.yaml"
    test_job: "test (reusable notch8/actions test.yaml; rspec_booster runs full RSpec, including :a11y; node 0 also runs bin/playwright-a11y after seed)"
    verify_in_logs: "Search for 'VPAT' in a green test job log, or ensure spec/features/accessibility/ is not excluded from rspec_cmd; Playwright runs on CI_NODE_INDEX=0"
  playwright_route_audit:
    manifest_example: "e2e/a11y-routes/a11y-routes.manifest.json.example"
    rake_seed: "hyku:demo_content:seed"
    runner: "bin/playwright-a11y"
    conformance_note: "Blocking axe tags match RSpec (wcag2a, wcag2aa, wcag21aa). AAA violations are written for information only (not CI gate)."
  evidence_model:
    statuses:
      - Supports
      - Partially Supports
      - Does Not Support
      - Not Applicable
    required_release_metadata:
      - product_version
      - build_or_commit
      - evaluation_date
      - test_environment
      - browsers
      - assistive_technology
      - evaluated_urls
  third_party_note: >
    Universal Viewer, pdf.js, and some Blacklight/Hyrax widgets may require
    exception language in the VPAT unless remediated locally.
  exclusions_note: >
    Any axe exclusions should be documented with selector, reason, related WCAG
    criterion, and whether the issue is third-party or owned locally.
  hyku_baseline_contrast_remediation:
    - file: app/assets/stylesheets/hyku/splash.scss
      note: "Splash .product-features .heading on #f4f4f4 (replaces insufficient $gray)"
    - file: app/assets/stylesheets/hyku.scss
      note: "body.public-facing .breadcrumb a overrides appearance link_color on #e9ecef"
  regression_focus_hyku_5_to_7:
    - "1.1.1"
    - "1.3.1"
    - "1.4.3"
    - "2.1.1"
    - "2.1.2"
    - "4.1.2"
    - "4.1.3"
  related_docs:
    accessibility_guide: docs/accessibility/README.md
    evidence_template: docs/accessibility/acr-evidence-template.md
    manual_results_template: docs/accessibility/manual-results-template.csv
    vpat_workbook_checklist: docs/accessibility/vpat-workbook-checklist.md
    pa11y_sample_config: docs/accessibility/pa11yci.sample.json

criteria:
