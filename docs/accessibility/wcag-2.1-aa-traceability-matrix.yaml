axe_configuration:
  rspec_tags: ["a11y"]
  according_to_tags:
    - :wcag2a
    - :wcag2aa
    - :wcag21aa
  scan_scope:
    primary_selector: "#content-wrapper"
    masthead_selector: "#masthead"
    note: "Hyku Hyrax layout main landmark; catalog includes a separate masthead scan; splash and some pages may differ."
  evidence_artifacts:
    - "tmp/a11y/**/*.json"
    - "tmp/a11y/**/*.html"
    - "tmp/a11y/**/*.png"
